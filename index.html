<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird - GitHub Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #70c5ce;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100vh;
            margin: auto;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }
        #start-screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            z-index: 20;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <h1 id="score-display" class="text-6xl font-bold">0</h1>
    </div>

    <div id="start-screen">
        <div class="bg-black/40 backdrop-blur-md p-8 rounded-3xl border-2 border-white/20 shadow-2xl">
            <h2 class="text-4xl font-black mb-4 uppercase tracking-wider">Flappy GitHub</h2>
            <p class="mb-6 opacity-90">Click to Jump & Start Music</p>
            <button id="start-btn" class="bg-green-500 hover:bg-green-400 text-white font-bold py-3 px-10 rounded-full text-xl transition-transform active:scale-95 pointer-events-auto shadow-lg">
                PLAY
            </button>
        </div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;

        // Game Constants
        const BIRD_X = 100;
        const PIPE_WIDTH = 70;
        const PIPE_GAP = 180;
        const PIPE_SPEED = 4;
        const JUMP_FORCE = -8.5;
        const SPAWN_RATE = 1400;

        let engine, render, runner;
        let bird, ground;
        let pipes = [];
        let score = 0;
        let gameActive = false;
        let lastPipeTime = 0;
        
        // Audio Setup
        const bgm = new Audio('bgm.mp3');
        bgm.loop = true;

        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const scoreDisplay = document.getElementById('score-display');

        function init() {
            engine = Engine.create();
            engine.gravity.y = 1.3;

            render = Render.create({
                element: document.body,
                engine: engine,
                options: {
                    width: window.innerWidth,
                    height: window.innerHeight,
                    wireframes: false,
                    // Updated to bg.jpg per your request
                    background: 'bg.jpg' 
                }
            });

            // Bird Body with bird.png
            bird = Bodies.circle(BIRD_X, window.innerHeight / 2, 24, {
                restitution: 0.2,
                render: {
                    sprite: {
                        texture: 'bird.png',
                        xScale: 0.1, 
                        yScale: 0.1
                    }
                }
            });

            // Invisible ground (keeps bird on screen)
            ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 30, window.innerWidth, 60, {
                isStatic: true,
                render: { visible: false }
            });

            Composite.add(engine.world, [bird, ground]);

            Render.run(render);
            runner = Runner.create();
            Runner.run(runner, engine);

            Events.on(engine, 'collisionStart', (event) => {
                if (!gameActive) return;
                event.pairs.forEach(pair => {
                    if (pair.bodyA === bird || pair.bodyB === bird) gameOver();
                });
            });

            Events.on(runner, 'beforeUpdate', () => {
                if (!gameActive) return;
                const now = Date.now();
                if (now - lastPipeTime > SPAWN_RATE) {
                    createPipePair();
                    lastPipeTime = now;
                }
                updatePipes();
                checkScore();
            });

            window.addEventListener('resize', handleResize);
            document.addEventListener('mousedown', flap);
            document.addEventListener('touchstart', flap);
        }

        function createPipePair() {
            const minPipeHeight = 100;
            const maxPipeHeight = window.innerHeight - PIPE_GAP - minPipeHeight;
            const topHeight = Math.floor(Math.random() * (maxPipeHeight - minPipeHeight + 1)) + minPipeHeight;
            const x = window.innerWidth + PIPE_WIDTH;

            const commonOptions = {
                isStatic: true,
                render: {
                    sprite: {
                        texture: 'obstacle.png'
                    }
                }
            };

            const topPipe = Bodies.rectangle(x, topHeight / 2, PIPE_WIDTH, topHeight, commonOptions);
            const bottomHeight = window.innerHeight - topHeight - PIPE_GAP;
            const bottomPipe = Bodies.rectangle(x, window.innerHeight - bottomHeight / 2, PIPE_WIDTH, bottomHeight, commonOptions);

            topPipe.passed = false;
            pipes.push(topPipe, bottomPipe);
            Composite.add(engine.world, [topPipe, bottomPipe]);
        }

        function updatePipes() {
            for (let i = pipes.length - 1; i >= 0; i--) {
                const pipe = pipes[i];
                Body.setPosition(pipe, { x: pipe.position.x - PIPE_SPEED, y: pipe.position.y });
                if (pipe.position.x < -PIPE_WIDTH) {
                    Composite.remove(engine.world, pipe);
                    pipes.splice(i, 1);
                }
            }
        }

        function checkScore() {
            pipes.forEach(pipe => {
                if (!pipe.passed && pipe.position.x < bird.position.x) {
                    pipe.passed = true;
                    if (pipes.indexOf(pipe) % 2 === 0) {
                        score++;
                        scoreDisplay.innerText = score;
                    }
                }
            });
        }

        function flap() {
            if (!gameActive) return;
            Body.setVelocity(bird, { x: 0, y: JUMP_FORCE });
            Body.setAngle(bird, -0.2);
        }

        function startGame() {
            gameActive = true;
            score = 0;
            scoreDisplay.innerText = "0";
            startScreen.style.display = 'none';
            lastPipeTime = Date.now();
            
            bgm.currentTime = 0;
            bgm.play().catch(e => console.log("Audio play blocked"));

            Body.setPosition(bird, { x: BIRD_X, y: window.innerHeight / 2 });
            Body.setVelocity(bird, { x: 0, y: 0 });
            Body.setAngle(bird, 0);

            pipes.forEach(p => Composite.remove(engine.world, p));
            pipes = [];
        }

        function gameOver() {
            gameActive = false;
            bgm.pause();
            startScreen.style.display = 'flex';
            startScreen.querySelector('h2').innerText = "CRASHED!";
            startBtn.innerText = "RESTART";
        }

        function handleResize() {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
            // Updated to bg.jpg here as well
            render.options.background = 'bg.jpg';
            Body.setPosition(ground, { x: window.innerWidth / 2, y: window.innerHeight + 30 });
        }

        startBtn.onclick = (e) => {
            e.stopPropagation();
            startGame();
        };

        window.onload = init;
    </script>
</body>
</html>
